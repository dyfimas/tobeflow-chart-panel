name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Validate archive structure
        run: |
          for f in module.js plugin.json README.md LICENSE CHANGELOG.md; do
            test -f "dist/$f" || { echo "Missing dist/$f"; exit 1; }
          done
          echo "Archive contents validated"

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: plugin-dist
          path: dist/
          retention-days: 7
