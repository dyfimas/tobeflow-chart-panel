name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Sign plugin
        run: npx @grafana/sign-plugin@latest --rootUrls https://grafana.tobeit.es
        env:
          GRAFANA_ACCESS_POLICY_TOKEN: ${{ secrets.GRAFANA_ACCESS_POLICY_TOKEN }}

      - name: Package plugin
        run: |
          PLUGIN_ID="tobeit-tobeflow-panel"
          VERSION="${GITHUB_REF_NAME#v}"
          ARCHIVE="${PLUGIN_ID}-${VERSION}.zip"

          mv dist "${PLUGIN_ID}"
          zip -r "${ARCHIVE}" "${PLUGIN_ID}"

          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Generate checksum
        run: sha1sum "$ARCHIVE" > "${ARCHIVE}.sha1"

      - name: Generate provenance attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: ${{ env.ARCHIVE }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.ARCHIVE }}
            ${{ env.ARCHIVE }}.sha1
          generate_release_notes: true
